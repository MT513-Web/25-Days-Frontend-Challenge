<!--
===========================================================
DAY 12: VARIABLE SCOPE ANALYSIS
===========================================================

SUMMARY NOTES:
- Global variables are declared outside functions and are accessible throughout the entire script execution.
- Local variables are declared within a specific function boundary and exist only during its execution.
- Local scope takes precedence over global scope when variable names conflict (shadowing).
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 12 - Variable Scope Project</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 40px; 
            background-color: #694965; 
            color: #333; 
        }
        .container { 
            background-color: white; 
            padding: 25px; 
            border: 2px solid #3498db; 
            border-radius: 20px; 
            max-width: 550px; 
        }
        h2 { color: #2c3e50; margin-bottom: 10px; }
        button { 
            background-color: #3498db; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold;
        }
        button:hover { background-color: #2980b9; }
        .output-box { 
            margin-top: 20px; 
            padding: 15px; 
            background-color: #eef2f7; 
            border-left: 5px solid #2ecc71; 
            font-family: Courier, monospace; 
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Topic: Variable Scope (Global vs Local)</h2>
        <p style="margin-bottom: 15px; color: #666;">Testing variable visibility and block isolation rules in JavaScript.</p>
        
        <button onclick="checkScopeLogic()">Run Variable Test</button>
        
        <div id="display-area" class="output-box" style="display:none;"></div>
    </div>

    <script>
        // Global Variable - Accessible everywhere
        var scopeContext = "Global Level State";

        function checkScopeLogic() {
            // Local Variable - Isolated to this function
            var localMessage = "Local Level State";
            
            // Variable Shadowing - Local overrides Global
            var scopeContext = "Local Override State";

            // Generating clean, step-by-step trace messages
            var step1 = "Step 1: Local Variable Value = " + localMessage;
            var step2 = "Step 2: Shadowed Variable Value = " + scopeContext;
            var finalVerdict = "Verdict: Local scope takes precedence inside the function boundary.";

            // Displaying the results naturally on the screen
            var displayDiv = document.getElementById("display-area");
            displayDiv.style.display = "block";
            displayDiv.innerHTML = step1 + "<br>" + step2 + "<br><br><b>" + finalVerdict + "</b>";
        }
    </script>

</body>
</html>
